[project]
name = "bean"
version = "0.1.0"
description = "Local search over your Google Docs and Slack. No server: your credentials, your machine, Lance + DuckDB under ~/.bean."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "duckdb>=1.0",
    "lancedb>=0.15",
    "requests>=2.31",
    "fastembed>=0.3",
]

[project.scripts]
bean = "bean.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["bean"]
