name: CI

# Build + offline test gate. Reuses the same tooling as a real release
# (scripts/release.py check → build) so CI and `make release` stay in lockstep.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install bean + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Check (version sync + byte-compile + offline tests)
        run: python scripts/release.py check

  build:
    name: build wheel + sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build wheel + sdist
        run: python scripts/release.py build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bean-dist
          path: dist/*
          if-no-files-found: error
