name: CI

# Build + offline test gate. Reuses the same tooling as a real release
# (dev/release.py check → build) so CI and `make release` stay in lockstep.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # bean ships as a Claude Code plugin that runs in its own venv (scripts/bean.py),
          # not as a pip library people install across interpreters — so we test one version,
          # the one the plugin's venv uses, rather than a matrix.
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install bean + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Check (version sync + byte-compile + offline tests)
        run: python dev/release.py check

  plugin-eval:
    name: plugin eval (deepseek)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install bean
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      # Drives skills/bean/SKILL.md with DeepSeek over an offline fixture (the fixture uses a
      # deterministic embedding plugin, so no model download). Skips cleanly if the secret is unset.
      - name: Run plugin eval
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python dev/eval/run_eval.py

  build:
    name: build wheel + sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build wheel + sdist
        run: python dev/release.py build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bean-dist
          path: dist/*
          if-no-files-found: error
