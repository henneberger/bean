name: CI

# Build + offline test gate. Reuses the same tooling as a real release
# (scripts/release.py check → build) so CI and `make release` stay in lockstep.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # bean ships as a Claude Code plugin that runs in its own venv (scripts/beanw.py),
          # not as a pip library people install across interpreters — so we test one version,
          # the one the plugin's venv uses, rather than a matrix.
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install bean + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Check (version sync + byte-compile + offline tests)
        run: python scripts/release.py check

  build:
    name: build wheel + sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build wheel + sdist
        run: python scripts/release.py build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bean-dist
          path: dist/*
          if-no-files-found: error
